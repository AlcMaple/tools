<!doctype html>
<html class="dark" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>在线观看 · 源切换与自动关联交互稿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script>
      // token 值 1:1 取自 src/renderer/src/index.css 的 .dark 块
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#131313', surface: '#131313',
              'surface-container-lowest': '#0e0e0e', 'surface-container-low': '#1b1b1b',
              'surface-container': '#1f1f1f', 'surface-container-high': '#2a2a2a',
              'surface-container-highest': '#353535', 'surface-variant': '#353535',
              'on-surface': '#e2e2e2', 'on-surface-variant': '#d9c1c1',
              primary: '#ffb3b8', 'on-primary': '#5a1923',
              'primary-container': '#f09199', 'on-primary-container': '#6e2932',
              outline: '#a18c8c', 'outline-variant': '#544343',
              error: '#ffb4ab', tertiary: '#c8c6c6',
            },
            fontFamily: {
              headline: ['Inter', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
              label: ['Space Grotesk', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .msf { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #131313; }
      ::-webkit-scrollbar-thumb { background: #353535; border-radius: 2px; }
      .fade-in { animation: fadeIn .18s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 1s linear infinite; display: inline-block; }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body">
    <!-- ── 播放页主体(沉浸式,无侧边栏 —— 用户定调) ─────────────────────────── -->
    <main>
      <div class="max-w-[1400px] mx-auto px-4 md:px-8 py-6 space-y-5">
        <!-- 标题行 -->
        <div class="flex items-center gap-3 min-w-0">
          <button class="p-1.5 rounded-lg text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors shrink-0" title="返回">
            <span class="material-symbols-outlined leading-none" style="font-size:20px">arrow_back</span>
          </button>
          <h1 class="text-lg md:text-2xl font-bold font-headline text-on-surface truncate">光之美少女</h1>
        </div>

        <!-- 播放器区(状态机渲染) -->
        <div id="player" class="relative aspect-video w-full overflow-hidden rounded-xl bg-black"></div>

        <!-- 嵌入提示条(仅 B站) -->
        <div id="embed-notice" class="hidden flex-wrap items-center gap-2 rounded-lg bg-surface-container px-3 py-2 text-on-surface-variant/70">
          <span class="material-symbols-outlined leading-none shrink-0" style="font-size:14px">info</span>
          <span class="font-label text-[11px] tracking-wider">B 站站内播放器 · 未登录仅可试看,登录后完整观看</span>
        </div>

        <!-- 多站切换:三个内置源常驻(虚线=未关联),自定义源追加 -->
        <div class="flex flex-wrap items-center gap-2">
          <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40 mr-1">播放源</span>
          <span id="chips" class="contents"></span>
        </div>

        <!-- 站内线路 -->
        <div id="lines" class="hidden flex-wrap items-center gap-2"></div>

        <!-- 集数网格 -->
        <section id="eps-sec" class="hidden space-y-3">
          <div class="flex items-baseline gap-2 border-b border-outline-variant/20 pb-2">
            <h2 class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant">选集</h2>
            <span class="font-label text-[10px] text-on-surface-variant/40" id="eps-count"></span>
          </div>
          <div id="eps" class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(3rem,1fr))"></div>
        </section>
      </div>
    </main>

    <!-- toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center gap-2 rounded-xl bg-surface-container-high border border-outline-variant/20 px-4 py-3 shadow-2xl fade-in">
      <span class="material-symbols-outlined text-primary leading-none" style="font-size:18px">link</span>
      <span class="font-label text-xs text-on-surface" id="toast-text"></span>
    </div>

    <script>
      // ── 静态数据:光之美少女场景(嗷呜已绑定,稀饭搜不到正主,girigiri 有验证码+多候选) ──
      const SITES = {
        aowu:  { label: '嗷呜',     bound: true,  lines: ['D线', 'B线', 'K线'], eps: 24 },
        xifan: { label: '稀饭',     bound: false, scenario: 'not-found' },
        giri:  { label: 'Girigiri', bound: false, scenario: 'captcha-then-pick' },
        bili:  { label: 'B站',      bound: true,  custom: true },
      }
      const GIRI_RESULTS = [
        { t: '光之美少女 All Stars New Stage', y: '2012', n: '剧场版' },
        { t: '魔法使光之美少女!',              y: '2016', n: '50话' },
        { t: 'Q娃 光之美少女 5',               y: '2007', n: '49话' },
        { t: '光之美少女 Splash Star',         y: '2006', n: '49话' },
      ]
      let current = 'aowu'
      let giriBound = false
      let selectedEp = 3

      const $ = (id) => document.getElementById(id)
      const chipsEl = $('chips'), player = $('player'), linesEl = $('lines'), epsSec = $('eps-sec')

      // ── 源 chips:实线=已关联可直接播,虚线=未关联(点了才现场搜那一个站) ──
      function renderChips() {
        chipsEl.innerHTML = Object.entries(SITES).map(([k, s]) => {
          const bound = s.bound || (k === 'giri' && giriBound)
          const sel = k === current
          const base = 'px-3 py-1.5 rounded-lg border font-label text-[11px] font-bold tracking-wider transition-colors cursor-pointer'
          const tone = sel
            ? 'border-primary/40 bg-primary/15 text-primary'
            : bound
              ? 'border-transparent bg-surface-container text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface'
              : 'border-dashed border-outline-variant/40 bg-transparent text-on-surface-variant/50 hover:border-primary/40 hover:text-primary'
          const hint = bound ? '' : `<span class="material-symbols-outlined leading-none mr-1 align-[-2px]" style="font-size:12px">search</span>`
          return `<button onclick="switchSite('${k}')" class="${base} ${tone}" title="${bound ? s.label : s.label + ' · 未关联,点击后在该站搜索并关联'}">${hint}${s.label}</button>`
        }).join('')
      }

      // ── 播放器区状态 ──
      const centerBox = (inner) => `<div class="flex h-full flex-col items-center justify-center gap-3 text-on-surface-variant/60 fade-in px-6 text-center">${inner}</div>`

      function showPlaying(siteLabel) {
        player.innerHTML = `
          <div class="absolute inset-0 bg-gradient-to-br from-surface-container-low via-black to-black fade-in"></div>
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="material-symbols-outlined msf text-on-surface/20" style="font-size:72px">play_circle</span>
          </div>
          <div class="absolute left-0 right-0 bottom-0 px-4 py-2.5 bg-black/70 flex items-center gap-3 text-white/80">
            <span class="material-symbols-outlined msf leading-none" style="font-size:22px">play_arrow</span>
            <span class="font-label text-[11px]">06:42 / 24:00</span>
            <div class="flex-1 h-1 rounded-full bg-white/20"><div class="h-full w-[28%] rounded-full bg-primary"></div></div>
            <span class="material-symbols-outlined leading-none" style="font-size:18px">volume_up</span>
            <span class="material-symbols-outlined leading-none" style="font-size:18px">fullscreen</span>
          </div>
          <div class="absolute top-3 left-3 px-2 py-1 rounded bg-black/60 text-white/60 font-label text-[10px] tracking-wider">${siteLabel} · 第${String(selectedEp).padStart(2,'0')}话 (Chromium 原生控件示意)</div>`
        $('embed-notice').classList.add('hidden'); $('embed-notice').classList.remove('flex')
      }

      function showSearchPanel(kind) {
        // 懒式单站搜索:只搜当前点开的这一个站
        if (kind === 'loading') {
          player.innerHTML = centerBox(`<span class="material-symbols-outlined spin" style="font-size:32px">progress_activity</span>
            <span class="font-label text-xs tracking-widest">正在 ${SITES[current].label} 搜索「光之美少女」…</span>`)
          return
        }
        if (kind === 'captcha') {
          player.innerHTML = centerBox(`
            <div class="w-80 max-w-full rounded-2xl bg-surface-container-high border border-outline-variant/20 p-5 text-left fade-in">
              <div class="flex items-center gap-2 mb-3 text-on-surface">
                <span class="material-symbols-outlined text-primary leading-none" style="font-size:18px">password</span>
                <span class="font-label text-sm font-bold">Girigiri 需要验证码</span>
              </div>
              <div class="flex items-center gap-3 mb-3">
                <div class="w-28 h-11 rounded-lg bg-surface-container-highest flex items-center justify-center font-label text-lg tracking-[0.3em] text-on-surface-variant select-none italic">7 x K 4</div>
                <input class="flex-1 min-w-0 bg-surface-container border border-outline-variant/30 rounded-lg px-3 py-2.5 text-sm font-label focus:outline-none focus:border-primary/60" placeholder="输入验证码" />
              </div>
              <button onclick="giriSearch()" class="w-full py-2.5 rounded-lg bg-primary text-on-primary font-label text-xs font-bold tracking-wider hover:bg-primary/90 transition-colors">确认并搜索</button>
              <p class="mt-2 text-[10px] font-label text-on-surface-variant/40">与搜索下载页同一套验证码流程,只在点开该站时才会出现</p>
            </div>`)
          return
        }
        if (kind === 'results') {
          player.innerHTML = centerBox(`
            <div class="w-[440px] max-w-full rounded-2xl bg-surface-container-high border border-outline-variant/20 p-5 text-left fade-in">
              <div class="flex items-center gap-2 mb-1 text-on-surface">
                <span class="material-symbols-outlined text-primary leading-none" style="font-size:18px">travel_explore</span>
                <span class="font-label text-sm font-bold">在 Girigiri 找到 ${GIRI_RESULTS.length} 个结果</span>
              </div>
              <p class="text-[10px] font-label text-on-surface-variant/40 mb-3">挑一个开始播放 —— 选中会自动关联,下次直接播</p>
              <div class="flex flex-col gap-1.5 max-h-56 overflow-y-auto pr-1">
                ${GIRI_RESULTS.map((r, i) => `
                  <button onclick="pickResult(${i})" class="group flex items-center gap-3 px-3 py-2 rounded-xl bg-surface-container hover:bg-primary/10 border border-transparent hover:border-primary/30 transition-colors text-left">
                    <div class="w-9 h-12 rounded bg-surface-container-highest shrink-0 flex items-center justify-center">
                      <span class="material-symbols-outlined text-on-surface-variant/30" style="font-size:16px">image</span>
                    </div>
                    <div class="min-w-0 flex-1">
                      <div class="text-xs font-bold text-on-surface truncate">${r.t}</div>
                      <div class="text-[10px] font-label text-on-surface-variant/50 mt-0.5">${r.y} · ${r.n}</div>
                    </div>
                    <span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity leading-none" style="font-size:18px">play_arrow</span>
                  </button>`).join('')}
              </div>
              <div class="mt-3 flex items-center gap-2">
                <input class="flex-1 min-w-0 bg-surface-container border border-outline-variant/30 rounded-lg px-3 py-2 text-xs font-label focus:outline-none focus:border-primary/60" value="光之美少女" />
                <button class="px-3 py-2 rounded-lg bg-surface-container-highest text-on-surface-variant font-label text-[11px] tracking-wider hover:text-on-surface transition-colors">重搜</button>
              </div>
            </div>`)
          return
        }
        if (kind === 'not-found') {
          player.innerHTML = centerBox(`
            <div class="w-96 max-w-full rounded-2xl bg-surface-container-high border border-outline-variant/20 p-5 text-left fade-in">
              <div class="flex items-center gap-2 mb-1 text-on-surface">
                <span class="material-symbols-outlined text-on-surface-variant leading-none" style="font-size:18px">search_off</span>
                <span class="font-label text-sm font-bold">稀饭没搜到「光之美少女」</span>
              </div>
              <p class="text-[10px] font-label text-on-surface-variant/40 mb-3 leading-relaxed">该站可能没有这部番(只有《名侦探之光之美少女》这类同名不同作)。可以换个关键词重搜,或换其他播放源。</p>
              <div class="flex items-center gap-2">
                <input class="flex-1 min-w-0 bg-surface-container border border-outline-variant/30 rounded-lg px-3 py-2 text-xs font-label focus:outline-none focus:border-primary/60" value="光之美少女" />
                <button class="px-3 py-2 rounded-lg bg-surface-container-highest text-on-surface-variant font-label text-[11px] tracking-wider hover:text-on-surface transition-colors">重搜</button>
              </div>
            </div>`)
        }
      }

      function showEmbed() {
        player.innerHTML = `
          <div class="absolute inset-0 bg-black flex flex-col items-center justify-center gap-2 fade-in">
            <span class="material-symbols-outlined text-on-surface/25" style="font-size:56px">tv</span>
            <span class="font-label text-[11px] tracking-widest text-on-surface/30">player.bilibili.com iframe</span>
          </div>`
        $('embed-notice').classList.remove('hidden'); $('embed-notice').classList.add('flex')
      }

      // ── 线路 + 集数 ──
      function renderLines(names) {
        if (!names) { linesEl.classList.add('hidden'); linesEl.classList.remove('flex'); return }
        linesEl.classList.remove('hidden'); linesEl.classList.add('flex')
        linesEl.innerHTML = `<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40 mr-1">线路</span>` +
          names.map((n, i) => `<button class="px-2.5 py-1 rounded-md border font-label text-[10px] font-bold tracking-wider transition-colors ${i===0?'border-primary/40 bg-primary/15 text-primary':'border-transparent bg-surface-container text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface'}">${n}</button>`).join('')
      }
      function renderEps(n) {
        if (!n) { epsSec.classList.add('hidden'); return }
        epsSec.classList.remove('hidden')
        $('eps-count').textContent = n + ' 集'
        $('eps').innerHTML = Array.from({ length: n }, (_, i) => {
          const ep = i + 1, sel = ep === selectedEp
          return `<button onclick="selectedEp=${ep};refresh()" class="aspect-square rounded-lg px-1 flex items-center justify-center font-label text-xs font-medium transition-colors overflow-hidden ${sel?'bg-primary text-on-primary':'bg-surface-container text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface'}"><span class="truncate">${String(ep).padStart(2,'0')}</span></button>`
        }).join('')
      }

      // ── 状态机 ──
      function refresh() {
        renderChips()
        const s = SITES[current]
        if (current === 'bili') { showEmbed(); renderLines(null); renderEps(0); return }
        if (current === 'aowu') { showPlaying('嗷呜'); renderLines(s.lines); renderEps(s.eps); return }
        if (current === 'giri') {
          if (giriBound) { showPlaying('Girigiri'); renderLines(['主线']); renderEps(50) }
          else { showSearchPanel('captcha'); renderLines(null); renderEps(0) }
          return
        }
        // 稀饭:搜索中 → 没搜到
        showSearchPanel('loading'); renderLines(null); renderEps(0)
        setTimeout(() => { if (current === 'xifan') showSearchPanel('not-found') }, 900)
      }

      function switchSite(k) { current = k; $('embed-notice').classList.add('hidden'); $('embed-notice').classList.remove('flex'); refresh() }

      function giriSearch() {
        showSearchPanel('loading')
        setTimeout(() => { if (current === 'giri') showSearchPanel('results') }, 900)
      }

      function pickResult(i) {
        giriBound = true
        selectedEp = 1
        toast(`已自动关联 Girigiri ·「${GIRI_RESULTS[i].t}」,下次直接播放`)
        refresh()
      }

      let toastTimer = null
      function toast(text) {
        $('toast-text').textContent = text
        $('toast').classList.remove('hidden'); $('toast').classList.add('flex')
        clearTimeout(toastTimer)
        toastTimer = setTimeout(() => { $('toast').classList.add('hidden'); $('toast').classList.remove('flex') }, 3600)
      }

      refresh()
    </script>
  </body>
</html>
