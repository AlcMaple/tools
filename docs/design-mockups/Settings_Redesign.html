// ── Tweak helpers ──
function useTweaks(defaults) {
  const [tweaks, setTweaks] = useState(defaults);
  const setTweak = (k, v) => setTweaks(s => ({ ...s, [k]: v }));
  return [tweaks, setTweak];
}

// ── Reusable Row component ──
function Row({ row, density, value, onChange, accentVar }) {
  const heightCls = density === 'compact' ? 'py-3.5' : density === 'spacious' ? 'py-7' : 'py-5';
  return (
    <div className={`group flex items-start gap-5 px-6 ${heightCls} hover:bg-white/[0.02] transition-colors`}>
      <div className="mt-0.5 w-9 h-9 rounded-lg bg-surface-container-high flex items-center justify-center text-on-surface-variant flex-shrink-0">
        <span className="material-symbols-outlined text-[20px] leading-none">{row.icon}</span>
      </div>
      <div className="flex-1 min-w-0 pr-4">
        <h3 className="font-headline font-semibold text-[14px] text-on-surface tracking-tight">{row.title}</h3>
        <p className="font-body text-[12px] leading-relaxed text-on-surface-variant/60 mt-1 max-w-2xl">{row.desc}</p>
      </div>
      <div className="flex-shrink-0 self-center min-w-[180px] flex justify-end">
        <Control row={row} value={value} onChange={onChange} accentVar={accentVar} />
      </div>
    </div>
  );
}

function Control({ row, value, onChange, accentVar }) {
  switch (row.kind) {
    case 'switch':
      return <Switch checked={!!value} onChange={onChange} />;
    case 'select':
      return (
        <select value={value} onChange={e => onChange(e.target.value)}
          className="bg-surface-container-high text-on-surface text-[12px] font-label rounded-lg px-3 py-2 border border-white/5 hover:border-white/15 focus:border-primary-container/40 focus:outline-none transition-colors min-w-[180px]">
          {row.options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      );
    case 'segment':
      return (
        <div className="inline-flex bg-surface-container-high rounded-lg p-1 border border-white/5">
          {row.options.map(o => (
            <button key={o.v} onClick={() => onChange(o.v)}
              className={`px-3 py-1.5 text-[11px] font-label uppercase tracking-wider rounded-md transition-all
                ${value === o.v ? 'bg-primary-container text-on-primary-container shadow-sm' : 'text-on-surface-variant/70 hover:text-on-surface'}`}>
              {o.l}
            </button>
          ))}
        </div>
      );
    case 'swatches':
      return (
        <div className="flex items-center gap-2">
          {row.options.map(o => (
            <button key={o.v} onClick={() => onChange(o.v)} aria-label={o.v}
              className={`w-7 h-7 rounded-full border-2 transition-all ${value === o.v ? 'border-on-surface scale-110' : 'border-transparent hover:scale-110'}`}
              style={{ background: o.c }} />
          ))}
        </div>
      );
    case 'slider':
      return (
        <div className="flex items-center gap-3 w-[220px]">
          <input type="range" min={row.min} max={row.max} value={value} onChange={e => onChange(+e.target.value)}
            className="flex-1 accent-primary-container" />
          <span className="font-label text-[12px] text-on-surface tabular-nums w-10 text-right">{value}{row.id==='fontScale'?'%':''}</span>
        </div>
      );
    case 'text':
    case 'password':
      return (
        <input type={row.kind} value={value} onChange={e => onChange(e.target.value)} placeholder={row.placeholder}
          className="bg-surface-container-high text-on-surface placeholder-on-surface-variant/30 text-[12px] font-label rounded-lg px-3 py-2 border border-white/5 hover:border-white/15 focus:border-primary-container/40 focus:outline-none transition-colors w-[260px]" />
      );
    case 'path': {
      const display = value || '默认: 脚本同级目录';
      const isEmpty = !value;
      return (
        <div className="flex items-center gap-2 w-[320px]">
          <div className={`flex-1 bg-surface-container-high rounded-lg px-3 py-2 text-[12px] font-label truncate border border-white/5 ${isEmpty ? 'text-on-surface-variant/35' : 'text-on-surface'}`}>{display}</div>
          {!isEmpty && (
            <button onClick={() => onChange('')} className="w-9 h-9 rounded-lg bg-surface-container-high hover:bg-surface-bright text-on-surface-variant/60 hover:text-on-surface flex items-center justify-center transition-colors" title="清空">

            </button>
          )}
          <button onClick={() => onChange('D:/MapleTools/Downloads')} className="w-9 h-9 rounded-lg bg-surface-container-high hover:bg-surface-bright text-on-surface-variant/80 hover:text-on-surface flex items-center justify-center transition-colors" title="选择文件夹">
            <span className="material-symbols-outlined text-[16px] leading-none">drive_folder_upload</span>
          </button>
        </div>
      );
    }
    case 'action': {
      const tone = row.tone === 'danger' ? 'border-error/30 text-error hover:bg-error/10' : 'border-white/10 text-on-surface hover:bg-white/5';
      return (
        <button className={`px-4 py-2 rounded-lg border text-[12px] font-label uppercase tracking-wider transition-colors ${tone}`}>
          {row.actionLabel}
        </button>
      );
    }
    case 'link':
      return (
        <button className="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg border border-white/10 text-on-surface text-[12px] font-label uppercase tracking-wider hover:bg-white/5 transition-colors">
          {row.actionLabel}
          <span className="material-symbols-outlined text-[14px] leading-none">arrow_outward</span>
        </button>
      );
    case 'readonly':
      return <span className="font-label text-[12px] text-on-surface-variant/80 tabular-nums">{value}</span>;
    default: return null;
  }
}

function Switch({ checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)}
      className={`relative w-11 h-6 rounded-full transition-colors ${checked ? 'bg-primary-container' : 'bg-surface-container-highest'}`}>
      <span className={`absolute top-[2px] left-[2px] w-5 h-5 rounded-full bg-white transition-transform shadow ${checked ? 'translate-x-5' : 'translate-x-0'}`} />
    </button>
  );
}

// ── Header bar ──
function Header({ stats, onToggleTheme, isDark, showStats }) {
  return (
    <header className="sticky top-0 z-40 bg-background/85 backdrop-blur-xl border-b border-white/5">
      <div className="h-14 px-6 flex items-center justify-between">
        <div className="flex items-center gap-4">
          <button className="w-8 h-8 rounded-lg hover:bg-white/5 flex items-center justify-center text-on-surface-variant" title="返回">
            <span className="material-symbols-outlined text-[18px] leading-none">arrow_back</span>
          </button>
          <div className="flex items-center gap-2 font-label text-[11px] uppercase tracking-[0.2em] text-on-surface-variant/60">
            <span className="text-on-surface/80">Dashboard</span>
            <span className="text-on-surface-variant/30">/</span>
            <span>System Preferences</span>
          </div>
        </div>
        {showStats && (
          <div className="flex items-center gap-5">
            <Stat icon="storage" label={stats.disk} />
            <Stat icon="downloading" label={`${stats.tasks} TASKS`} active={stats.tasks > 0} />
            <Stat icon="speed" label={stats.speed} />
            <div className="flex items-center gap-1.5">
              <span className={`w-1.5 h-1.5 rounded-full ${stats.online ? 'bg-tertiary pulse-dot' : 'bg-error'}`} />
              <span className={`material-symbols-outlined text-[14px] leading-none ${stats.online ? 'text-tertiary' : 'text-error'}`}>{stats.online ? 'wifi_tethering' : 'wifi_off'}</span>
              <span className={`font-label text-[10px] tracking-widest ${stats.online ? 'text-tertiary' : 'text-error'}`}>{stats.online ? 'ONLINE' : 'OFFLINE'}</span>
            </div>
            <span className="h-4 w-px bg-white/10" />
            <button onClick={onToggleTheme} className="w-8 h-8 rounded-lg hover:bg-white/5 flex items-center justify-center text-on-surface-variant" title="切换主题">
              <span className="material-symbols-outlined text-[16px] leading-none">{isDark ? 'light_mode' : 'dark_mode'}</span>
            </button>
          </div>
        )}
      </div>
    </header>
  );
}
function Stat({ icon, label, active }) {
  return (
    <div className={`flex items-center gap-1.5 ${active ? 'text-primary-container' : 'text-on-surface-variant/60'}`}>
      <span className="material-symbols-outlined text-[14px] leading-none">{icon}</span>
      <span className="font-label text-[10px] tracking-widest uppercase">{label}</span>
    </div>
  );
}

// ── Left rail (category nav) ──
function CategoryRail({ active, onSelect, navStyle }) {
  if (navStyle === 'tabs') {
    return (
      <div className="border-b border-white/5 bg-surface-container-low/40 sticky top-0 z-30 backdrop-blur-xl">
        <div className="px-6 flex items-center gap-1 overflow-x-auto nice-scroll">
          {CATEGORIES.map(c => {
            const isActive = active === c.id;
            return (
              <button key={c.id} onClick={() => onSelect(c.id)}
                className={`relative flex items-center gap-2 px-4 py-3 text-[13px] font-label uppercase tracking-wider whitespace-nowrap transition-colors
                  ${isActive ? 'text-on-surface' : 'text-on-surface-variant/55 hover:text-on-surface'}`}>
                <span className="material-symbols-outlined text-[16px] leading-none">{c.icon}</span>
                {c.en}
                {isActive && <span className="absolute left-3 right-3 -bottom-px h-0.5 bg-primary-container rounded-full" />}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <aside className="w-[260px] flex-shrink-0 border-r border-white/5 bg-surface-container-low/30 flex flex-col">
      <div className="px-6 pt-8 pb-5">
        <div className="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant/40 mb-2">Settings</div>
        <h1 className="font-headline font-black text-[28px] tracking-tight text-on-surface leading-none">
          系统偏好<span className="text-primary-container">.</span>
        </h1>
      </div>
      <nav className="px-3 flex-1 overflow-y-auto nice-scroll pb-6">
        {CATEGORIES.map(c => {
          const isActive = active === c.id;
          return (
            <button key={c.id} onClick={() => onSelect(c.id)}
              className={`group w-full flex items-center gap-3 px-3 py-2.5 rounded-lg mb-0.5 text-left transition-colors
                ${isActive ? 'bg-primary-container/15 text-on-surface' : 'text-on-surface-variant/70 hover:bg-white/[0.04] hover:text-on-surface'}`}>
              <span className={`material-symbols-outlined text-[18px] leading-none flex-shrink-0 ${isActive ? 'text-primary-container' : ''}`}>{c.icon}</span>
              <span className="flex-1 min-w-0">
                <span className="block text-[13px] font-headline font-semibold leading-tight truncate">{c.label}</span>
                <span className="block text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40 leading-tight mt-0.5">{c.en}</span>
              </span>
            </button>
          );
        })}
      </nav>
      <div className="px-6 py-5 border-t border-white/5">
        <div className="flex items-center gap-2 text-on-surface-variant/40">
          <span className="material-symbols-outlined text-[14px] leading-none">fingerprint</span>
          <span className="font-label text-[10px] tracking-widest uppercase">ARC-7392-K</span>
        </div>
        <div className="font-label text-[10px] tracking-widest uppercase text-on-surface-variant/30 mt-1.5">MapleTools 1.4.2</div>
      </div>
    </aside>
  );
}

// ── Block (a section inside a category) ──
function Block({ block, values, onChange, density, accentVar }) {
  return (
    <section className="bg-surface-container/60 rounded-2xl border border-white/5 overflow-hidden">
      <header className="px-6 pt-5 pb-3 flex items-baseline justify-between gap-4">
        <h2 className="font-headline font-bold text-[13px] uppercase tracking-[0.2em] text-on-surface-variant/60">{block.title}</h2>
        {block.hint && <span className="font-body text-[11px] text-on-surface-variant/35 max-w-md text-right hidden md:block">{block.hint}</span>}
      </header>
      <div className="divide-y divide-white/5">
        {block.rows.map(r => (
          <Row key={r.id} row={r} density={density} value={values[r.id] ?? r.value}
            onChange={(v) => onChange(r.id, v)} accentVar={accentVar} />
        ))}
      </div>
      {block.footer && <BlockFooter footer={block.footer} />}
    </section>
  );
}

function BlockFooter({ footer }) {
  const [state, setState] = useState('idle'); // idle | testing | ok
  const onClick = () => {
    if (state !== 'idle') return;
    setState('testing');
    setTimeout(() => {
      setState('ok');
      setTimeout(() => setState('idle'), 2200);
    }, 1100);
  };
  return (
    <div className="px-6 py-4 border-t border-white/5 bg-surface-container-low/40 flex items-center gap-3">
      <button onClick={onClick} disabled={state === 'testing'}
        className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-white/10 hover:bg-white/5 disabled:opacity-50 text-on-surface text-[12px] font-label uppercase tracking-wider transition-colors">
        <span className={`material-symbols-outlined text-[16px] leading-none ${state==='testing'?'animate-spin':''}`}>
          {state === 'ok' ? 'check_circle' : footer.icon}
        </span>
        {state === 'testing' ? '测试中…' : state === 'ok' ? '连接成功' : footer.label}
      </button>
      {state === 'ok' && <span className="font-label text-[11px] text-tertiary">已写入并验证 WebDAV 配置</span>}
    </div>
  );
}

// ── Tweaks panel ──
function TweaksPanel({ tweaks, setTweak, open, onClose }) {
  if (!open) return null;
  return (
    <div className="fixed top-20 right-6 z-50 w-[300px] bg-surface-container-high/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl">
      <div className="px-5 py-4 flex items-center justify-between border-b border-white/5">
        <span className="font-label text-[11px] uppercase tracking-[0.25em] text-on-surface-variant">Tweaks</span>
        <button onClick={onClose} className="text-on-surface-variant/60 hover:text-on-surface">
          <span className="material-symbols-outlined text-[18px] leading-none">close</span>
        </button>
      </div>
      <div className="p-5 space-y-5">
        <TweakRadio label="主题" value={tweaks.theme} onChange={v => setTweak('theme', v)}
          options={[{v:'dark',l:'深色'},{v:'light',l:'浅色'}]} />
        <TweakRadio label="导航样式" value={tweaks.navStyle} onChange={v => setTweak('navStyle', v)}
          options={[{v:'rail',l:'侧边栏'},{v:'tabs',l:'顶部标签'}]} />
        <TweakRadio label="界面密度" value={tweaks.density} onChange={v => setTweak('density', v)}
          options={[{v:'compact',l:'紧凑'},{v:'comfortable',l:'舒适'},{v:'spacious',l:'宽松'}]} />
        <TweakSwitch label="顶栏显示状态" value={tweaks.showStatusInHeader} onChange={v => setTweak('showStatusInHeader', v)} />
      </div>
    </div>
  );
}
function TweakRadio({ label, value, onChange, options }) {
  return (
    <div>
      <div className="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60 mb-2">{label}</div>
      <div className="inline-flex bg-surface-container rounded-lg p-0.5 w-full">
        {options.map(o => (
          <button key={o.v} onClick={() => onChange(o.v)}
            className={`flex-1 text-[11px] py-1.5 rounded-md transition-all ${value===o.v ? 'bg-primary-container text-on-primary-container font-bold' : 'text-on-surface-variant/70 hover:text-on-surface'}`}>
            {o.l}
          </button>
        ))}
      </div>
    </div>
  );
}
function TweakSwitch({ label, value, onChange }) {
  return (
    <div className="flex items-center justify-between">
      <span className="font-label text-[11px] uppercase tracking-widest text-on-surface-variant">{label}</span>
      <Switch checked={value} onChange={onChange} />
    </div>
  );
}

// ── Main App ──
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [active, setActive] = useState('general');
  const [values, setValues] = useState({});       // { rowId: newValue }
  const contentRef = useRef(null);

  // Theme follow tweak
  useEffect(() => {
    document.documentElement.classList.toggle('dark', tweaks.theme === 'dark');
  }, [tweaks.theme]);

  // 修改配置时立即生效
  const handleChange = (id, v) => {
    setValues(s => ({ ...s, [id]: v }));
    // 💡 在真实应用中，你可以在这里触发同步到本地存储或后端的代码
    // 例如: ipcRenderer.send('save-setting', { key: id, value: v });
  };

  // System stats (fake for the mock)
  const stats = { disk: '218G FREE', tasks: 2, speed: '5.2 MB/S', online: true };

  const blocks = SETTINGS_DATA[active] || [];
  const cat = CATEGORIES.find(c => c.id === active);

  const isDark = tweaks.theme === 'dark';
  const navStyle = tweaks.navStyle;
  const density = tweaks.density;

  return (
    <div className="h-full flex flex-col relative">
      <Header stats={stats} isDark={isDark}
        onToggleTheme={() => setTweak('theme', isDark ? 'light' : 'dark')}
        showStats={tweaks.showStatusInHeader} />

      {/* Tweaks toggle (top-right floating) */}
      <button onClick={() => setTweaksOpen(o => !o)}
        className="fixed top-3 right-6 z-50 w-8 h-8 rounded-lg bg-surface-container-high/80 backdrop-blur border border-white/10 hover:bg-surface-container-highest text-on-surface-variant flex items-center justify-center"
        title="Tweaks">
        <span className="material-symbols-outlined text-[16px] leading-none">tune</span>
      </button>

      <div className="flex flex-1 min-h-0">
        {navStyle === 'rail' && (
          <CategoryRail active={active} onSelect={setActive} navStyle="rail" />
        )}

        <main ref={contentRef} className="flex-1 overflow-y-auto nice-scroll relative">
          {navStyle === 'tabs' && (
            <CategoryRail active={active} onSelect={setActive} navStyle="tabs" />
          )}

          <div className="max-w-3xl mx-auto px-8 py-10">
            {/* Category header */}
            <div key={active} className="fade-up mb-8">
              <div className="flex items-center gap-3 font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant/40 mb-3">
                <span className="material-symbols-outlined text-[14px] leading-none">{cat.icon}</span>
                {cat.en}
              </div>
              <h2 className="font-headline font-black text-[40px] tracking-tight text-on-surface leading-[1.05]">
                {cat.label}
                <span className="text-primary-container">.</span>
              </h2>
              <p className="font-body text-[14px] text-on-surface-variant/55 mt-2 max-w-xl">{cat.desc}</p>
            </div>

            {/* Blocks */}
            <div key={`blocks-${active}`} className="fade-up space-y-5 pb-10">
              {blocks.map((b, i) => (
                <Block key={`${active}-${i}`} block={b} values={values} onChange={handleChange}
                  density={density} accentVar="--c-primary-container" />
              ))}

              {/* Empty-state-resilient footnote */}
              <div className="pt-4 flex items-center gap-3 text-on-surface-variant/30">
                <span className="material-symbols-outlined text-[14px] leading-none">cloud_done</span>
                <span className="font-label text-[10px] uppercase tracking-widest">设置已自动保存并实时生效</span>
              </div>
            </div>
          </div>
        </main>
      </div>

      <TweaksPanel tweaks={tweaks} setTweak={setTweak} open={tweaksOpen} onClose={() => setTweaksOpen(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
