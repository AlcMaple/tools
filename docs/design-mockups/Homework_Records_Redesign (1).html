<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MapleTools · 阵容知识库 · 记录(重设计)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  tailwind.config = { darkMode: 'class', theme: { extend: {
    colors: {
      primary: '#f09199', 'primary-container': '#f09199',
      'on-primary-container': '#6e2932',
      'on-surface': '#e2e2e2',
      'on-surface-variant': '#d9c1c1',
      'surface': '#131313',
      'surface-container-low': '#1b1b1b',
      'surface-container': '#1f1f1f',
      'surface-container-high': '#2a2a2a',
      'surface-container-highest': '#353535',
      'outline-variant': '#544343',
      'tertiary': '#c8c6c6',
      'error': '#ffb4ab',
    },
    fontFamily: { headline: ['Inter','sans-serif'], body: ['Inter','sans-serif'], label: ['"Space Grotesk"','sans-serif'] },
  }}};
</script>
<style>
  body { background:#131313; color:#e2e2e2; font-family:Inter,sans-serif; -webkit-font-smoothing:antialiased; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
  .fade-up { animation:fadeUp .25s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes pulseDot { 0%,100%{opacity:.35;transform:scale(.85);} 50%{opacity:1;transform:scale(1);} }
  .pulse-dot { animation:pulseDot 1.4s ease-in-out infinite; }
  .nice-scroll::-webkit-scrollbar{width:6px;height:6px;} .nice-scroll::-webkit-scrollbar-thumb{background:rgba(217,193,193,.15);border-radius:999px;}
</style>
</head>
<body class="dark">
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect, useMemo } = React;

const SEED = [
  'レイカは華麗な僕の女王',
  'オタクの僕が一軍ギャルと付き合えるまでの話',
  'ボクの理想の異世界生活',
  'お兄ちゃん、朝までずっとギュッてして！',
  '俺だけレベルアップな件',
  '転生したらスライムだった件',
  '陰の実力者になりたくて！',
  '無職転生 ～異世界行ったら本気だす～',
];

function Page() {
  const [records, setRecords] = useState(() => SEED.map((t, i) => ({
    id: 'r' + i, text: t, time: Date.now() - (SEED.length - i) * 86400000 * 1.7,
  })));
  const [draft, setDraft] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState('');
  const [confirmId, setConfirmId] = useState(null);
  const [search, setSearch] = useState('');
  const [view, setView] = useState('dense'); // 'dense' | 'wrap'
  const [recentlyAdded, setRecentlyAdded] = useState(null);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return q ? records.filter(r => r.text.toLowerCase().includes(q)) : records;
  }, [records, search]);

  const add = () => {
    const t = draft.trim();
    if (!t) return;
    const id = 'r' + Date.now();
    setRecords(rs => [{ id, text: t, time: Date.now() }, ...rs]);
    setDraft('');
    setRecentlyAdded(id);
    setTimeout(() => setRecentlyAdded(null), 1200);
  };

  const startEdit = (r) => { setEditingId(r.id); setEditText(r.text); };
  const commitEdit = () => {
    const t = editText.trim();
    if (!t) { setEditingId(null); return; }
    setRecords(rs => rs.map(r => r.id === editingId ? { ...r, text: t, time: Date.now() } : r));
    setEditingId(null);
  };
  const cancelEdit = () => setEditingId(null);
  const remove = (id) => { setRecords(rs => rs.filter(r => r.id !== id)); setConfirmId(null); };

  const fmt = (t) => {
    const d = Math.floor((Date.now() - t) / 86400000);
    if (d === 0) return '今天';
    if (d === 1) return '昨天';
    if (d < 7) return `${d} 天前`;
    return new Date(t).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
  };

  return (
    <div className="min-h-screen flex">
      {/* Sidebar (mock) */}
      <aside className="w-[240px] flex-shrink-0 border-r border-white/5 px-6 pt-8">
        <div className="font-headline font-black text-[18px] text-primary tracking-tight">MAPLE TOOLS</div>
        <div className="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40 mt-1">v0.1.0</div>
        <nav className="mt-10 space-y-1 text-[13px] text-on-surface-variant/60">
          {['Local Library','Search & Download','Download Queue','Anime Info','File Explorer'].map(l => (
            <div key={l} className="px-3 py-2 rounded-md hover:bg-white/5">{l}</div>
          ))}
          <div className="px-3 py-2 rounded-md bg-primary/10 text-primary border-l-2 border-primary -ml-px">Homework</div>
        </nav>
      </aside>

      {/* Main */}
      <main className="flex-1 px-10 pt-10 pb-20 max-w-[1280px]">
        {/* Header (mocked) */}
        <div className="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant/40 mb-2">Tools / 阵容知识库</div>
        <h1 className="font-headline font-black text-[40px] tracking-tight text-on-surface leading-none">阵容知识库<span className="text-primary">.</span></h1>
        <p className="font-body text-[13px] text-on-surface-variant/55 mt-2">查询作业 · 浏览经典阵容 · 流水账记录</p>

        {/* Tabs (mocked) */}
        <div className="mt-6 flex gap-2">
          {[['shield','作业查询'], ['auto_awesome','经典阵容'], ['edit_note','记录']].map(([i, l], idx) => (
            <div key={i} className={`inline-flex items-center gap-2 px-4 py-2 rounded-lg text-[12px] font-headline font-semibold ${idx===2?'bg-primary/15 text-primary border border-primary/20':'bg-surface-container/60 text-on-surface-variant/60 border border-white/5'}`}>
              <span className="material-symbols-outlined text-[15px] leading-none">{i}</span>{l}
            </div>
          ))}
        </div>

        {/* Add box */}
        <div className="mt-8 flex gap-3">
          <div className="flex-1 flex items-center gap-3 bg-surface-container/60 rounded-xl px-4 h-12 border border-white/5 focus-within:border-primary/30 transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant/40 text-[18px] leading-none">edit_note</span>
            <input value={draft} onChange={e => setDraft(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && add()}
              placeholder="记一笔，回车保存…"
              className="bg-transparent flex-1 outline-none text-[13px] placeholder-on-surface-variant/30" />
            <span className="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/30">↵ Enter</span>
          </div>
          <button onClick={add} disabled={!draft.trim()}
            className="px-6 h-12 rounded-xl bg-primary-container text-on-primary-container font-headline font-bold text-[12px] tracking-wide hover:brightness-105 active:brightness-95 disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center gap-2">
            <span className="material-symbols-outlined text-[16px] leading-none">add</span>添加
          </button>
        </div>

        {/* Toolbar */}
        <div className="mt-6 flex items-center gap-4">
          <span className="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40">{filtered.length} / {records.length} 条</span>
          <span className="flex-1" />
          <div className="relative">
            <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-[14px] leading-none">search</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜索…"
              className="bg-surface-container/60 rounded-md pl-8 pr-3 h-8 text-[12px] outline-none border border-white/5 focus:border-primary/30 transition-colors w-[200px] placeholder-on-surface-variant/30" />
          </div>
          <div className="inline-flex bg-surface-container/60 rounded-md p-0.5 border border-white/5">
            {[['view_agenda','dense','紧凑列表'], ['grid_view','wrap','流式标签']].map(([i, v, t]) => (
              <button key={v} onClick={() => setView(v)}
                className={`px-2 h-7 rounded flex items-center justify-center transition-all ${view===v?'bg-surface-container-highest text-on-surface':'text-on-surface-variant/50 hover:text-on-surface'}`}
                title={t}>
                <span className="material-symbols-outlined text-[14px] leading-none">{i}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Records */}
        {filtered.length === 0 ? (
          <div className="mt-10 py-16 text-center text-on-surface-variant/40">
            <span className="material-symbols-outlined text-[32px] leading-none opacity-40">inbox</span>
            <div className="font-label text-[10px] uppercase tracking-widest mt-2">{search ? '无匹配' : '暂无记录'}</div>
          </div>
        ) : view === 'dense' ? (
          <div className="mt-3 bg-surface-container/30 rounded-lg border border-white/5 overflow-hidden">
            {filtered.map((r, i) => (
              <DenseRow key={r.id} r={r} idx={i + 1}
                isNew={recentlyAdded === r.id}
                isEditing={editingId === r.id}
                editText={editText} setEditText={setEditText}
                onStartEdit={() => startEdit(r)}
                onCommit={commitEdit} onCancel={cancelEdit}
                onAskDelete={() => setConfirmId(r.id)}
                onConfirmDelete={() => remove(r.id)}
                isConfirming={confirmId === r.id}
                onCancelConfirm={() => setConfirmId(null)}
                query={search} />
            ))}
          </div>
        ) : (
          <div className="mt-3 flex flex-wrap gap-1.5">
            {filtered.map((r) => (
              <Chip key={r.id} r={r}
                isNew={recentlyAdded === r.id}
                isEditing={editingId === r.id}
                editText={editText} setEditText={setEditText}
                onStartEdit={() => startEdit(r)}
                onCommit={commitEdit} onCancel={cancelEdit}
                onAskDelete={() => setConfirmId(r.id)}
                onConfirmDelete={() => remove(r.id)}
                isConfirming={confirmId === r.id}
                onCancelConfirm={() => setConfirmId(null)}
                query={search} />
            ))}
          </div>
        )}
      </main>
    </div>
  );
}

function HL({ text, q }) {
  if (!q) return <>{text}</>;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return <>{text}</>;
  return <>{text.slice(0,i)}<mark className="bg-primary/25 text-primary px-0.5 rounded-sm">{text.slice(i, i+q.length)}</mark>{text.slice(i+q.length)}</>;
}

function DenseRow({ r, idx, isNew, isEditing, editText, setEditText, onStartEdit, onCommit, onCancel, onAskDelete, onConfirmDelete, isConfirming, onCancelConfirm, query }) {
  const ref = useRef();
  useEffect(() => { if (isEditing) ref.current?.focus(); }, [isEditing]);
  return (
    <div className={`group flex items-center gap-2 h-8 px-3 border-b border-white/[0.04] last:border-b-0 transition-colors
      ${isEditing ? 'bg-surface-container-high/60' : 'hover:bg-white/[0.035]'}
      ${isNew ? 'fade-up' : ''}`}>
      <span className="font-label text-[9px] uppercase tracking-widest text-on-surface-variant/25 tabular-nums w-6 flex-shrink-0">{String(idx).padStart(2,'0')}</span>
      {isEditing ? (
        <input ref={ref} value={editText} onChange={e => setEditText(e.target.value)}
          onKeyDown={e => { if (e.key==='Enter') onCommit(); if (e.key==='Escape') onCancel(); }}
          className="flex-1 bg-transparent outline-none text-[13px] min-w-0" />
      ) : (
        <p onClick={onStartEdit} className="flex-1 text-[13px] text-on-surface truncate min-w-0 cursor-text"><HL text={r.text} q={query} /></p>
      )}
      {isEditing ? (
        <div className="flex items-center gap-0.5 flex-shrink-0">
          <button onClick={onCancel} className="px-2 h-6 text-[10px] font-label uppercase tracking-widest text-on-surface-variant/60 hover:text-on-surface">取消</button>
          <button onClick={onCommit} className="px-2 h-6 rounded bg-primary-container text-on-primary-container text-[10px] font-headline font-bold tracking-wide">保存</button>
        </div>
      ) : isConfirming ? (
        <div className="flex items-center gap-0.5 flex-shrink-0">
          <button onClick={onCancelConfirm} className="px-2 h-6 text-[10px] font-label uppercase tracking-widest text-on-surface-variant/60 hover:text-on-surface">取消</button>
          <button onClick={onConfirmDelete} className="px-2 h-6 rounded bg-error/20 text-error text-[10px] font-headline font-bold tracking-wide hover:bg-error/30">确认删除</button>
        </div>
      ) : (
        <div className="flex items-center gap-0.5 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onClick={onStartEdit} title="编辑" className="w-6 h-6 rounded hover:bg-white/10 text-on-surface-variant/70 hover:text-on-surface flex items-center justify-center">
            <span className="material-symbols-outlined text-[13px] leading-none">edit</span>
          </button>
          <button onClick={onAskDelete} title="删除" className="w-6 h-6 rounded hover:bg-error/15 text-on-surface-variant/70 hover:text-error flex items-center justify-center">
            <span className="material-symbols-outlined text-[13px] leading-none">delete</span>
          </button>
        </div>
      )}
    </div>
  );
}

function Chip({ r, isNew, isEditing, editText, setEditText, onStartEdit, onCommit, onCancel, onAskDelete, onConfirmDelete, isConfirming, onCancelConfirm, query }) {
  const ref = useRef();
  useEffect(() => { if (isEditing) ref.current?.focus(); }, [isEditing]);
  if (isEditing) {
    return (
      <div className="inline-flex items-center gap-1 h-7 pl-3 pr-1 rounded-md bg-surface-container-high border border-primary/40 ring-1 ring-primary/20">
        <input ref={ref} value={editText} onChange={e => setEditText(e.target.value)}
          onKeyDown={e => { if (e.key==='Enter') onCommit(); if (e.key==='Escape') onCancel(); }}
          className="bg-transparent outline-none text-[12px] min-w-[120px]" style={{width: Math.max(120, editText.length * 14)}} />
        <button onClick={onCancel} className="px-1.5 h-5 text-[10px] font-label uppercase text-on-surface-variant/60 hover:text-on-surface">×</button>
        <button onClick={onCommit} className="px-2 h-5 rounded bg-primary-container text-on-primary-container text-[10px] font-headline font-bold">保存</button>
      </div>
    );
  }
  if (isConfirming) {
    return (
      <div className="inline-flex items-center gap-1 h-7 pl-3 pr-1 rounded-md bg-error/10 border border-error/30">
        <span className="text-[12px] text-on-surface">{r.text}</span>
        <button onClick={onCancelConfirm} className="px-1.5 h-5 text-[10px] font-label uppercase text-on-surface-variant/60 hover:text-on-surface">×</button>
        <button onClick={onConfirmDelete} className="px-2 h-5 rounded bg-error/20 text-error text-[10px] font-headline font-bold">删除</button>
      </div>
    );
  }
  return (
    <div className={`group inline-flex items-center h-7 rounded-md bg-surface-container/60 border border-white/5 hover:border-white/15 transition-colors ${isNew ? 'fade-up ring-1 ring-primary/40' : ''}`}>
      <button onClick={onStartEdit} className="px-3 text-[12px] text-on-surface max-w-[260px] truncate"><HL text={r.text} q={query} /></button>
      <div className="flex items-center pr-1 gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity max-w-0 group-hover:max-w-[60px] overflow-hidden">
        <button onClick={onStartEdit} title="编辑" className="w-5 h-5 rounded hover:bg-white/10 text-on-surface-variant/70 hover:text-on-surface flex items-center justify-center">
          <span className="material-symbols-outlined text-[12px] leading-none">edit</span>
        </button>
        <button onClick={onAskDelete} title="删除" className="w-5 h-5 rounded hover:bg-error/15 text-on-surface-variant/70 hover:text-error flex items-center justify-center">
          <span className="material-symbols-outlined text-[12px] leading-none">delete</span>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
