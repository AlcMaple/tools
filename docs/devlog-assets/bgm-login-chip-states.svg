<svg viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="1000" height="320" fill="#ffffff"/>
  <text x="500" y="20" text-anchor="middle" font-size="16" font-weight="700" fill="#111">BgmLoginChip 组件 — 状态流转</text>

  <!-- 初始 -->
  <rect x="430" y="34" width="140" height="46" rx="10" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#1B4F8C">初始</text>

  <!-- 未登录 / 检查中 / 已登录 -->
  <rect x="90" y="190" width="180" height="56" rx="10" fill="#FBE9E9" stroke="#E05555" stroke-width="1.5"/>
  <text x="180" y="223" text-anchor="middle" font-size="13" fill="#A32E2E">未登录</text>

  <rect x="420" y="190" width="160" height="56" rx="10" fill="#FCF1E3" stroke="#F5A623" stroke-width="1.5"/>
  <text x="500" y="223" text-anchor="middle" font-size="13" fill="#B9720A">检查中</text>

  <rect x="730" y="190" width="180" height="56" rx="10" fill="#E7F8EF" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="820" y="223" text-anchor="middle" font-size="13" fill="#1D8A4E">已登录</text>

  <!-- 初始 -> 检查中 -->
  <line x1="500" y1="80" x2="500" y2="188" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="620" y="140" text-anchor="middle" font-size="11" fill="#222">需要自动检查</text>
  <text x="620" y="155" text-anchor="middle" font-size="11" fill="#222">（跨过8点节流窗口）</text>

  <!-- 初始 -> 未登录（直达，命中缓存） -->
  <path d="M 440 80 C 350 120, 250 150, 190 188" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#222">命中节流缓存</text>
  <text x="270" y="165" text-anchor="middle" font-size="11" fill="#222">（未登录）</text>

  <!-- 初始 -> 已登录（直达，命中缓存） -->
  <path d="M 560 80 C 650 120, 750 150, 810 188" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="730" y="150" text-anchor="middle" font-size="11" fill="#222">命中节流缓存</text>
  <text x="730" y="165" text-anchor="middle" font-size="11" fill="#222">（已登录）</text>

  <!-- 检查中 <-> 未登录：上行=判定结果，下行=用户操作 -->
  <line x1="418" y1="210" x2="272" y2="205" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="345" y="196" text-anchor="middle" font-size="11" fill="#222">未登录 / 已过期</text>

  <line x1="272" y1="232" x2="418" y2="237" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="345" y="256" text-anchor="middle" font-size="11" fill="#222">点击"点此登录"</text>

  <!-- 检查中 <-> 已登录：上行=判定结果，下行=用户操作 -->
  <line x1="582" y1="205" x2="728" y2="210" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="655" y="196" text-anchor="middle" font-size="11" fill="#222">校验通过</text>

  <line x1="728" y1="237" x2="582" y2="232" stroke="#333" stroke-width="1.8" marker-end="url(#arrow3)"/>
  <text x="655" y="256" text-anchor="middle" font-size="11" fill="#222">点击"BGM已登录"重新校验</text>

  <text x="20" y="300" font-size="11" fill="#555">上行箭头 = 检查/校验的结果　下行箭头 = 用户点击触发的重新检查</text>
</svg>
