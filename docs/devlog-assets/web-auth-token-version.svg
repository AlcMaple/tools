<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <marker id="tvArrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#94464f"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="798" height="428" rx="10" fill="#fbfafc" stroke="#e5e0e3"/>

  <text x="24" y="30" font-size="13" font-weight="700" fill="#2a2a2e">token_version：无状态 JWT 怎么做到「改密码踢掉所有设备」</text>
  <text x="24" y="48" font-size="11.5" fill="#7a7a80">JWT 自证、验的时候本不查库 → 改密码它照样有效。加一列 token_version，验签后再比一次，就有了真吊销。</text>

  <!-- 列头 -->
  <g font-size="12" font-weight="700" text-anchor="middle" fill="#404046">
    <text x="215" y="80">设备 A（改密码的这台）</text>
    <text x="435" y="80">设备 B（其它设备）</text>
    <text x="655" y="80">SQLite users</text>
  </g>

  <!-- ── 改密码前 ── -->
  <rect x="16" y="92" width="60" height="66" rx="5" fill="#166c45" opacity="0.12"/>
  <text x="46" y="122" font-size="11" font-weight="700" text-anchor="middle" fill="#166c45">改密码</text>
  <text x="46" y="138" font-size="11" font-weight="700" text-anchor="middle" fill="#166c45">前</text>

  <g>
    <rect x="120" y="98" width="190" height="52" rx="6" fill="#ffffff" stroke="#d9d1d4"/>
    <text x="215" y="120" font-size="12.5" text-anchor="middle" fill="#404046">cookie: JWT{ tv: 0 }</text>
    <text x="215" y="139" font-size="11.5" font-weight="700" text-anchor="middle" fill="#166c45">0 === 0 → ✅ 可用</text>

    <rect x="340" y="98" width="190" height="52" rx="6" fill="#ffffff" stroke="#d9d1d4"/>
    <text x="435" y="120" font-size="12.5" text-anchor="middle" fill="#404046">cookie: JWT{ tv: 0 }</text>
    <text x="435" y="139" font-size="11.5" font-weight="700" text-anchor="middle" fill="#166c45">0 === 0 → ✅ 可用</text>

    <rect x="570" y="98" width="170" height="52" rx="6" fill="#ffffff" stroke="#d9d1d4"/>
    <text x="655" y="130" font-size="13" font-weight="700" text-anchor="middle" fill="#404046">token_version = 0</text>
  </g>

  <!-- ── 动作 ── -->
  <rect x="16" y="176" width="60" height="66" rx="5" fill="#94464f" opacity="0.12"/>
  <text x="46" y="206" font-size="11" font-weight="700" text-anchor="middle" fill="#94464f">A 改</text>
  <text x="46" y="222" font-size="11" font-weight="700" text-anchor="middle" fill="#94464f">密码</text>

  <rect x="120" y="180" width="620" height="58" rx="6" fill="#94464f" opacity="0.07" stroke="#94464f" stroke-opacity="0.2"/>
  <text x="136" y="202" font-size="12.5" fill="#404046">① 设备 A 提交 <tspan font-weight="700">POST /settings</tspan>（要原始密码）｜ 或任意设备走 <tspan font-weight="700">/forgot</tspan>（密保问题 + 答案）</text>
  <text x="136" y="224" font-size="12.5" fill="#94464f" font-weight="700">② token_version + 1  →  0 变成 1</text>
  <line x1="600" y1="219" x2="655" y2="219" stroke="#94464f" stroke-width="1.6" marker-end="url(#tvArrow)"/>

  <!-- ── 改密码后 ── -->
  <rect x="16" y="262" width="60" height="66" rx="5" fill="#166c45" opacity="0.12"/>
  <text x="46" y="292" font-size="11" font-weight="700" text-anchor="middle" fill="#166c45">改密码</text>
  <text x="46" y="308" font-size="11" font-weight="700" text-anchor="middle" fill="#166c45">后</text>

  <g>
    <rect x="120" y="266" width="190" height="58" rx="6" fill="#ffffff" stroke="#166c45" stroke-opacity="0.4"/>
    <text x="215" y="288" font-size="12.5" text-anchor="middle" fill="#404046">收到补发的 JWT{ tv: 1 }</text>
    <text x="215" y="309" font-size="11.5" font-weight="700" text-anchor="middle" fill="#166c45">1 === 1 → ✅ 继续用</text>

    <rect x="340" y="266" width="190" height="58" rx="6" fill="#ffffff" stroke="#94464f" stroke-opacity="0.5"/>
    <text x="435" y="288" font-size="12.5" text-anchor="middle" fill="#404046">还揣着旧 JWT{ tv: 0 }</text>
    <text x="435" y="309" font-size="11.5" font-weight="700" text-anchor="middle" fill="#94464f">0 ≠ 1 → ❌ 401 踢下线</text>

    <rect x="570" y="266" width="170" height="58" rx="6" fill="#ffffff" stroke="#d9d1d4"/>
    <text x="655" y="301" font-size="13" font-weight="700" text-anchor="middle" fill="#94464f">token_version = 1</text>
  </g>

  <!-- 注脚 -->
  <rect x="120" y="344" width="620" height="30" rx="5" fill="#94464f" opacity="0.08"/>
  <text x="136" y="364" font-size="11.5" fill="#404046">⚠ 设备 A 必须<tspan font-weight="700" fill="#94464f">补发新 cookie</tspan> —— 否则 tv 一涨，改密码的人把自己也踢下线了。</text>

  <text x="136" y="396" font-size="11.5" fill="#7a7a80">代价：每个已登录请求多一次 uid 索引读（微秒级）。顺带白送「退出所有设备」。</text>
  <text x="136" y="414" font-size="11.5" fill="#7a7a80">/forgot 另加 15 分钟 5 次限流 —— 密保答案熵低（「你的出生地」猜几十次就中），不限流等于敞开暴力破解。</text>
</svg>
