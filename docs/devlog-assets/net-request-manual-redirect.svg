<svg viewBox="0 0 1060 830" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="aR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D64545"/>
    </marker>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E9E63"/>
    </marker>
  </defs>

  <rect width="1060" height="830" fill="#ffffff"/>
  <text x="530" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111">redirect:'manual' 碰到 3xx —— 修复前后的数据 / 状态流</text>
  <text x="530" y="52" text-anchor="middle" font-size="12" fill="#777">Electron net 在 manual 下不把 3xx 当 response 抛出,而是发 'redirect' 事件并把请求挂起</text>

  <!-- ══════════ 左:修复前 ══════════ -->
  <rect x="40" y="70" width="470" height="660" rx="14" fill="#FDECEC" stroke="#E05B5B" stroke-width="1.5"/>
  <text x="275" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#B23838">❌ 修复前:没人接 'redirect' 事件</text>

  <rect x="80" y="128" width="390" height="58" rx="9" fill="#ffffff" stroke="#E05B5B" stroke-width="1.2"/>
  <text x="275" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#333">HttpSession.get(旧域名 /search/?wd=我爱你)</text>
  <text x="275" y="172" text-anchor="middle" font-size="10.5" fill="#888">cookie jar:第 0 跳</text>

  <line x1="275" y1="186" x2="275" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="80" y="220" width="390" height="50" rx="9" fill="#ffffff" stroke="#E05B5B" stroke-width="1.2"/>
  <text x="275" y="250" text-anchor="middle" font-size="12" fill="#333">netRequest(url, { redirect: 'manual' })</text>

  <line x1="275" y1="270" x2="275" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="80" y="304" width="390" height="50" rx="9" fill="#FFF7E6" stroke="#F5A623" stroke-width="1.2"/>
  <text x="275" y="334" text-anchor="middle" font-size="12" fill="#333">站点回 301 · Location: ani.girigirilove.com/…</text>

  <line x1="275" y1="354" x2="275" y2="384" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="80" y="388" width="390" height="60" rx="9" fill="#ffffff" stroke="#E05B5B" stroke-width="1.2"/>
  <text x="275" y="411" text-anchor="middle" font-size="12" font-weight="600" fill="#333">net 发 'redirect' 事件 → 请求挂起</text>
  <text x="275" y="432" text-anchor="middle" font-size="10.5" fill="#888">等着调用方调 followRedirect()</text>

  <line x1="275" y1="448" x2="275" y2="478" stroke="#D64545" stroke-width="1.8" marker-end="url(#aR)"/>
  <text x="290" y="468" font-size="11" font-weight="700" fill="#B23838">没人接</text>

  <rect x="80" y="482" width="390" height="46" rx="9" fill="#ffffff" stroke="#E05B5B" stroke-width="1.2"/>
  <text x="275" y="510" text-anchor="middle" font-size="12" fill="#333">请求被作废 → 触发 'error'</text>

  <line x1="275" y1="528" x2="275" y2="558" stroke="#D64545" stroke-width="1.8" marker-end="url(#aR)"/>

  <rect x="100" y="562" width="350" height="50" rx="9" fill="#D64545"/>
  <text x="275" y="592" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Error: Redirect was cancelled</text>

  <rect x="80" y="632" width="390" height="80" rx="9" fill="#FBE0E0" stroke="#E05B5B" stroke-width="1"/>
  <text x="98" y="654" font-size="11" fill="#8a4a4a">· 第二跳<tspan font-weight="700">从没发出</tspan>,新域名的 body 永远拿不到</text>
  <text x="98" y="674" font-size="11" fill="#8a4a4a">· cookie jar <tspan font-weight="700">停在第 0 跳</tspan>,新域名 cookie 没 ingest</text>
  <text x="98" y="694" font-size="11" fill="#8a4a4a">· 搜索 / 验证码 / watch / 在线播放 <tspan font-weight="700">全线同一个错</tspan></text>

  <!-- ══════════ 右:修复后 ══════════ -->
  <rect x="550" y="70" width="470" height="660" rx="14" fill="#EAF7F0" stroke="#3BB273" stroke-width="1.5"/>
  <text x="785" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#1F8A54">✅ 修复后:接住 'redirect',把 3xx 交回调用方</text>

  <rect x="590" y="128" width="390" height="56" rx="9" fill="#ffffff" stroke="#3BB273" stroke-width="1.2"/>
  <text x="785" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#333">HttpSession.get(同一个旧域名 URL)</text>
  <text x="785" y="170" text-anchor="middle" font-size="10.5" fill="#888">cookie jar:第 0 跳</text>

  <line x1="785" y1="184" x2="785" y2="210" stroke="#2E9E63" stroke-width="1.5" marker-end="url(#aG)"/>

  <rect x="590" y="214" width="390" height="50" rx="9" fill="#ffffff" stroke="#3BB273" stroke-width="1.2"/>
  <text x="785" y="236" text-anchor="middle" font-size="12" fill="#333">netRequest(url, { redirect: 'manual' })</text>
  <text x="785" y="255" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1F8A54">+ request.on('redirect', …)</text>

  <line x1="785" y1="264" x2="785" y2="290" stroke="#2E9E63" stroke-width="1.5" marker-end="url(#aG)"/>

  <rect x="590" y="294" width="390" height="50" rx="9" fill="#FFF7E6" stroke="#F5A623" stroke-width="1.2"/>
  <text x="785" y="324" text-anchor="middle" font-size="12" fill="#333">站点回 301 · Location: ani.girigirilove.com/…</text>

  <line x1="785" y1="344" x2="785" y2="370" stroke="#2E9E63" stroke-width="1.5" marker-end="url(#aG)"/>

  <rect x="590" y="374" width="390" height="60" rx="9" fill="#ffffff" stroke="#3BB273" stroke-width="1.2"/>
  <text x="785" y="397" text-anchor="middle" font-size="12" font-weight="600" fill="#333">handler resolve({ status: 301, headers })</text>
  <text x="785" y="418" text-anchor="middle" font-size="10.5" fill="#888">当成一次正常返回,不是错误</text>

  <line x1="785" y1="434" x2="785" y2="460" stroke="#2E9E63" stroke-width="1.5" marker-end="url(#aG)"/>

  <rect x="590" y="464" width="390" height="54" rx="9" fill="#ffffff" stroke="#3BB273" stroke-width="1.2"/>
  <text x="785" y="485" text-anchor="middle" font-size="12" fill="#333">ingest Set-Cookie → 读 Location</text>
  <text x="785" y="505" text-anchor="middle" font-size="10.5" fill="#888">cookie jar:第 1 跳 · redirectsLeft--</text>

  <line x1="785" y1="518" x2="785" y2="544" stroke="#2E9E63" stroke-width="1.5" marker-end="url(#aG)"/>

  <rect x="590" y="548" width="390" height="50" rx="9" fill="#ffffff" stroke="#3BB273" stroke-width="1.2"/>
  <text x="785" y="578" text-anchor="middle" font-size="12" fill="#333">netRequest(新域名) → 200 + body</text>

  <line x1="785" y1="598" x2="785" y2="624" stroke="#2E9E63" stroke-width="1.8" marker-end="url(#aG)"/>

  <rect x="610" y="628" width="350" height="48" rx="9" fill="#2E9E63"/>
  <text x="785" y="657" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">搜索结果 / needs_captcha 正常返回</text>

  <rect x="590" y="692" width="390" height="24" rx="6" fill="#DCF2E7"/>
  <text x="785" y="708" text-anchor="middle" font-size="10.5" fill="#3a7a5c">最多跟 5 跳(redirectsLeft),超了抛 Too many redirects</text>

  <!-- 底部结论 -->
  <rect x="40" y="746" width="980" height="62" rx="10" fill="#F7F9FB" stroke="#c9d2dc" stroke-width="1"/>
  <text x="60" y="768" font-size="11.5" fill="#41556b">· <tspan font-weight="700">为什么必须用 manual</tspan>:cookie 会话要<tspan font-weight="700">逐跳 ingest Set-Cookie</tspan>;交给 net 自动 follow 就拿不到中间跳的 Set-Cookie。</text>
  <text x="60" y="792" font-size="11.5" fill="#41556b">· 这条路从 Node-https 迁到 netRequest 时就断了,只是站点一直没返回 3xx,<tspan font-weight="700">潜伏到换域名才炸</tspan>。用 manual 的地方都要接这个事件。</text>
</svg>
