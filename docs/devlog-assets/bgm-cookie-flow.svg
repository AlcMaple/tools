<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="20" text-anchor="middle" font-size="16" font-weight="700" fill="#111">BGM 两个 cookie 的说明</text>

  <line x1="560" y1="30" x2="560" y2="560" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- 左：每次搜索请求 -->
  <rect x="150" y="35" width="300" height="50" rx="8" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="300" y="65" text-anchor="middle" font-size="13" fill="#1B4F8C">发起一次 BGM 搜索请求</text>

  <line x1="300" y1="85" x2="300" y2="128" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>

  <polygon points="300,130 430,180 300,230 170,180" fill="#FCF1E3" stroke="#F5A623" stroke-width="1.5"/>
  <text x="300" y="176" text-anchor="middle" font-size="11" fill="#B9720A">getBgmCookie()</text>
  <text x="300" y="192" text-anchor="middle" font-size="11" fill="#B9720A">是否为空？</text>

  <line x1="170" y1="180" x2="150" y2="268" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="128" y="228" text-anchor="middle" font-size="11" fill="#222">空</text>
  <rect x="20" y="270" width="260" height="60" rx="8" fill="#E7F8EF" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="150" y="296" text-anchor="middle" font-size="12" fill="#1D8A4E">只带匿名 cookie</text>
  <text x="150" y="314" text-anchor="middle" font-size="12" fill="#1D8A4E">（session jar）</text>

  <line x1="430" y1="180" x2="450" y2="268" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="472" y="228" text-anchor="middle" font-size="11" fill="#222">非空</text>
  <rect x="310" y="270" width="280" height="60" rx="8" fill="#FBE9E9" stroke="#E05555" stroke-width="1.5"/>
  <text x="450" y="296" text-anchor="middle" font-size="12" fill="#A32E2E">同时带上匿名 cookie</text>
  <text x="450" y="314" text-anchor="middle" font-size="12" fill="#A32E2E">和登录 cookie 去请求</text>

  <line x1="150" y1="330" x2="150" y2="360" stroke="#333" stroke-width="1.8"/>
  <line x1="150" y1="360" x2="300" y2="360" stroke="#333" stroke-width="1.8"/>
  <line x1="450" y1="330" x2="450" y2="360" stroke="#333" stroke-width="1.8"/>
  <line x1="450" y1="360" x2="300" y2="360" stroke="#333" stroke-width="1.8"/>
  <line x1="300" y1="360" x2="300" y2="373" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>

  <rect x="170" y="375" width="260" height="50" rx="8" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="300" y="405" text-anchor="middle" font-size="13" fill="#1B4F8C">发送请求，拿到响应</text>

  <line x1="300" y1="425" x2="300" y2="448" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>

  <rect x="130" y="450" width="340" height="60" rx="8" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="300" y="475" text-anchor="middle" font-size="12" fill="#1B4F8C">session.ingestSetCookie()</text>
  <text x="300" y="493" text-anchor="middle" font-size="12" fill="#1B4F8C">更新匿名 cookie jar（不分登录与否）</text>

  <line x1="130" y1="480" x2="40" y2="480" stroke="#333" stroke-width="1.8"/>
  <line x1="40" y1="480" x2="40" y2="60" stroke="#333" stroke-width="1.8"/>
  <line x1="40" y1="60" x2="148" y2="60" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="85" y="475" text-anchor="middle" font-size="11" fill="#222">下一次请求</text>

  <!-- 右：登录状态检查 -->
  <rect x="610" y="35" width="280" height="50" rx="8" fill="#F1EAFB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="750" y="55" text-anchor="middle" font-size="12" fill="#5B2FAE">打开动漫查询页</text>
  <text x="750" y="72" text-anchor="middle" font-size="12" fill="#5B2FAE">（BgmLoginChip 挂载）</text>

  <rect x="930" y="35" width="240" height="50" rx="8" fill="#F1EAFB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="1050" y="55" text-anchor="middle" font-size="12" fill="#5B2FAE">设置页手动点「检查」</text>
  <text x="1050" y="72" text-anchor="middle" font-size="12" fill="#5B2FAE">（不受节流限制）</text>

  <line x1="750" y1="85" x2="790" y2="191" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="790" y="128" text-anchor="middle" font-size="11" fill="#222">跨过8点节流窗口</text>
  <text x="790" y="144" text-anchor="middle" font-size="11" fill="#222">才会真的检查，否则跳过</text>

  <line x1="1050" y1="85" x2="930" y2="191" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="1000" y="140" text-anchor="middle" font-size="11" fill="#222">手动，始终检查</text>

  <rect x="700" y="195" width="320" height="50" rx="8" fill="#F1EAFB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="860" y="215" text-anchor="middle" font-size="12" fill="#5B2FAE">verifyBgmLogin()：带登录cookie</text>
  <text x="860" y="232" text-anchor="middle" font-size="12" fill="#5B2FAE">拉一次 bgm.tv 首页</text>

  <line x1="860" y1="245" x2="860" y2="288" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>

  <polygon points="860,290 990,340 860,390 730,340" fill="#FCF1E3" stroke="#F5A623" stroke-width="1.5"/>
  <text x="860" y="336" text-anchor="middle" font-size="11" fill="#B9720A">页面里有</text>
  <text x="860" y="352" text-anchor="middle" font-size="11" fill="#B9720A">/logout 吗？</text>

  <line x1="990" y1="340" x2="1000" y2="428" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="1015" y="384" text-anchor="middle" font-size="11" fill="#222">有</text>
  <rect x="870" y="430" width="260" height="60" rx="8" fill="#E7F8EF" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="1000" y="456" text-anchor="middle" font-size="12" fill="#1D8A4E">登录 cookie</text>
  <text x="1000" y="474" text-anchor="middle" font-size="12" fill="#1D8A4E">保持不变</text>

  <line x1="730" y1="340" x2="720" y2="428" stroke="#333" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="695" y="384" text-anchor="middle" font-size="11" fill="#222">没有</text>
  <rect x="580" y="430" width="280" height="60" rx="8" fill="#FBE9E9" stroke="#E05555" stroke-width="1.5"/>
  <text x="720" y="456" text-anchor="middle" font-size="12" fill="#A32E2E">清空登录 cookie</text>
  <text x="720" y="474" text-anchor="middle" font-size="12" fill="#A32E2E">setBgmCookie('')</text>

  <!-- 跨流程的因果影响 -->
  <line x1="680" y1="430" x2="680" y2="105" stroke="#8B5CF6" stroke-width="1.8" stroke-dasharray="6 4"/>
  <line x1="680" y1="105" x2="303" y2="105" stroke="#8B5CF6" stroke-width="1.8" stroke-dasharray="6 4"/>
  <line x1="300" y1="105" x2="300" y2="83" stroke="#8B5CF6" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrow4)"/>
  <text x="490" y="120" text-anchor="middle" font-size="11" fill="#5B2FAE">清空后，下一次搜索请求 getBgmCookie() 读到空</text>

  <text x="20" y="605" font-size="11" fill="#555">实线 = 当前流程内部　紫色虚线 = 跨流程的因果影响（异步、有时间差，不是同一次请求里发生的）</text>
</svg>
