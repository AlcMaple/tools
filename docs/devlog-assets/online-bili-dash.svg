<svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="bG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E9E63"/>
    </marker>
  </defs>

  <rect width="1060" height="780" fill="#ffffff"/>
  <text x="530" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111">B 站在线播放 —— TV appkey 签名问 playurl 要 DASH → 合成 MPD → shaka / MSE</text>
  <text x="530" y="50" text-anchor="middle" font-size="12" fill="#777">弃用官方外链播放器:它把画质锁在 360P、暂停弹推荐、盖引流层、合集拿不到分 P —— 登录也解不开</text>

  <!-- 泳道头 -->
  <rect x="30" y="66" width="250" height="54" rx="10" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="155" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#1B4F8C">渲染进程</text>
  <text x="155" y="108" text-anchor="middle" font-size="11" fill="#4A6E9C">OnlinePlayer · shaka · &lt;video&gt;</text>

  <rect x="400" y="66" width="260" height="54" rx="10" fill="#F1EAFB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="530" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#5B2FAE">主进程</text>
  <text x="530" y="108" text-anchor="middle" font-size="11" fill="#7550A8">bili/api · mtmedia 代理</text>

  <rect x="780" y="66" width="250" height="54" rx="10" fill="#FCF1E3" stroke="#F5A623" stroke-width="1.5"/>
  <text x="905" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#B9720A">B 站</text>
  <text x="905" y="108" text-anchor="middle" font-size="11" fill="#C68B34">api.bilibili.com · upos CDN</text>

  <line x1="155" y1="120" x2="155" y2="640" stroke="#4A90D9" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="530" y1="120" x2="530" y2="640" stroke="#8B5CF6" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="905" y1="120" x2="905" y2="640" stroke="#F5A623" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- ① 分 P -->
  <text x="40" y="150" font-size="12" font-weight="700" fill="#1B4F8C">① 集数列表</text>
  <line x1="155" y1="168" x2="525" y2="168" stroke="#444" stroke-width="1.4" marker-end="url(#b)"/>
  <text x="340" y="162" text-anchor="middle" font-size="11" fill="#333">bili:video-info(BV1zAQGB8Eqq)</text>
  <line x1="530" y1="196" x2="900" y2="196" stroke="#444" stroke-width="1.4" marker-end="url(#b)"/>
  <text x="715" y="190" text-anchor="middle" font-size="11" fill="#333">GET /x/web-interface/view</text>
  <line x1="900" y1="224" x2="160" y2="224" stroke="#2E9E63" stroke-width="1.4" marker-end="url(#bG)"/>
  <text x="530" y="218" text-anchor="middle" font-size="11" fill="#2E9E63">pages[] —— 12 个分 P(page = &amp;p=N,各带 cid)→ 直接当集数网格</text>

  <!-- ② playurl -->
  <text x="40" y="266" font-size="12" font-weight="700" fill="#1B4F8C">② 播放地址</text>
  <line x1="155" y1="284" x2="525" y2="284" stroke="#444" stroke-width="1.4" marker-end="url(#b)"/>
  <text x="340" y="278" text-anchor="middle" font-size="11" fill="#333">bili:dash(aid, cid)</text>

  <rect x="400" y="298" width="260" height="52" rx="8" fill="#F7F3FF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="530" y="317" text-anchor="middle" font-size="11" fill="#5B2FAE">md5(排序参数 + appsec) → sign</text>
  <text x="530" y="335" text-anchor="middle" font-size="10.5" fill="#7550A8">TV appkey 固定不变,不碰常换的 WBI 盐</text>

  <line x1="530" y1="372" x2="900" y2="372" stroke="#444" stroke-width="1.4" marker-end="url(#b)"/>
  <text x="715" y="366" text-anchor="middle" font-size="11" fill="#333">GET /x/player/playurl?fnval=4048</text>
  <text x="715" y="386" text-anchor="middle" font-size="10.5" fill="#888">带 persist:bili 的 cookie —— 画质由登录态定</text>

  <line x1="900" y1="414" x2="535" y2="414" stroke="#2E9E63" stroke-width="1.4" marker-end="url(#bG)"/>
  <text x="715" y="408" text-anchor="middle" font-size="11" fill="#2E9E63">dash{ video[80/64/32/16], audio }</text>
  <text x="715" y="428" text-anchor="middle" font-size="10.5" fill="#888">每档三种编码 avc1 / hev1 / av01</text>

  <rect x="380" y="442" width="300" height="52" rx="8" fill="#F7F3FF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="530" y="461" text-anchor="middle" font-size="11" fill="#5B2FAE">baseUrl → mtmedia://…&amp;r=bilibili.com</text>
  <text x="530" y="479" text-anchor="middle" font-size="10.5" fill="#7550A8">Referer 钉在代理 URL 上,渲染层拿不到裸签名链</text>

  <line x1="525" y1="516" x2="160" y2="516" stroke="#2E9E63" stroke-width="1.4" marker-end="url(#bG)"/>
  <text x="340" y="510" text-anchor="middle" font-size="11" fill="#2E9E63">BiliDash</text>

  <!-- ③ 播放 -->
  <text x="40" y="552" font-size="12" font-weight="700" fill="#1B4F8C">③ 播放</text>
  <rect x="30" y="562" width="250" height="52" rx="8" fill="#EDF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="155" y="581" text-anchor="middle" font-size="11" fill="#1B4F8C">合成 MPD(只留 avc1 档)</text>
  <text x="155" y="599" text-anchor="middle" font-size="10.5" fill="#4A6E9C">data: URI → shaka.load()</text>

  <line x1="155" y1="640" x2="900" y2="640" stroke="#444" stroke-width="1.4" marker-end="url(#b)"/>
  <text x="530" y="634" text-anchor="middle" font-size="11" fill="#333">shaka 逐段发 Range → mtmedia 代理 → net.fetch 带 Referer → CDN 206</text>

  <rect x="360" y="662" width="340" height="34" rx="8" fill="#E7F6EE" stroke="#2E9E63" stroke-width="1.2"/>
  <text x="530" y="684" text-anchor="middle" font-size="12" font-weight="600" fill="#1F6B45">&lt;video&gt; 1920×1080 · readyState 4 · 无广告无引流层</text>

  <!-- 脚注 -->
  <rect x="30" y="714" width="1000" height="48" rx="8" fill="#FFF6F6" stroke="#D97070" stroke-width="1"/>
  <text x="46" y="734" font-size="11" font-weight="600" fill="#A33">为什么不用 player.bilibili.com/player.html:</text>
  <text x="46" y="752" font-size="11" fill="#A33">画质菜单里摆着 1080P 但选了没反应(实际锁 360P)· 暂停弹推荐位 · 盖「进入哔哩哔哩,观看更高清」引流层 · 合集不给分 P 列表</text>
</svg>
