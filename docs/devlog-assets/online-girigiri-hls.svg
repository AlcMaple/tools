<svg viewBox="0 0 1060 840" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="gG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E9E63"/>
    </marker>
  </defs>

  <rect width="1060" height="840" fill="#ffffff"/>
  <text x="530" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111">Girigiri 在线播放 —— 解析 player_aaaa → mtmedia 重写 → hls.js / MSE</text>
  <text x="530" y="50" text-anchor="middle" font-size="12" fill="#777">地址就写在播放页 HTML 里(不用起隐藏窗口);多数线路是 m3u8,少数老番是 mp4,按后缀分流</text>

  <!-- 泳道头 -->
  <rect x="40" y="66" width="250" height="54" rx="10" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="165" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#1B4F8C">渲染进程</text>
  <text x="165" y="108" text-anchor="middle" font-size="11" fill="#4A6E9C">OnlinePlayer · hls.js · &lt;video&gt;</text>

  <rect x="400" y="66" width="260" height="54" rx="10" fill="#F1EAFB" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="530" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#5B2FAE">主进程</text>
  <text x="530" y="108" text-anchor="middle" font-size="11" fill="#7550A8">girigiri/api · mtmedia 代理</text>

  <rect x="770" y="66" width="240" height="54" rx="10" fill="#FCF1E3" stroke="#F5A623" stroke-width="1.5"/>
  <text x="890" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#B9720A">站点 / CDN</text>
  <text x="890" y="108" text-anchor="middle" font-size="11" fill="#C68B34">ani.girigirilove · giri/ana.top</text>

  <line x1="165" y1="120" x2="165" y2="712" stroke="#4A90D9" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="530" y1="120" x2="530" y2="712" stroke="#8B5CF6" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="890" y1="120" x2="890" y2="712" stroke="#F5A623" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- ── 阶段 A ─────────────────────────────────────────────── -->
  <rect x="40" y="134" width="150" height="22" rx="5" fill="#EEF2F7"/>
  <text x="52" y="150" font-size="11" font-weight="700" fill="#41556b">阶段 A · 解析播放地址</text>

  <line x1="165" y1="180" x2="524" y2="180" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="165" cy="180" r="12" fill="#444"/><text x="165" y="184.5" text-anchor="middle" font-size="11" fill="#fff">1</text>
  <text x="348" y="171" text-anchor="middle" font-size="11.5" fill="#222">girigiri:resolve-ep-url(第 N 集播放页)</text>

  <line x1="530" y1="224" x2="884" y2="224" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="530" cy="224" r="12" fill="#444"/><text x="530" y="228.5" text-anchor="middle" font-size="11" fill="#fff">2</text>
  <text x="710" y="215" text-anchor="middle" font-size="11.5" fill="#222">GET 播放页 HTML(giriSession:UA + cookie)</text>

  <line x1="890" y1="268" x2="536" y2="268" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="890" cy="268" r="12" fill="#444"/><text x="890" y="272.5" text-anchor="middle" font-size="11" fill="#fff">3</text>
  <text x="712" y="259" text-anchor="middle" font-size="11.5" fill="#222">HTML 内含 player_aaaa(encrypt=2)</text>

  <rect x="398" y="292" width="264" height="56" rx="8" fill="#F1EAFB" stroke="#8B5CF6" stroke-width="1.3"/>
  <text x="530" y="313" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5B2FAE">base64 → urldecode → 播放地址</text>
  <text x="530" y="333" text-anchor="middle" font-size="10.5" fill="#7550A8">静态路径 · 无签名 · 无时效(实测)</text>
  <circle cx="398" cy="320" r="12" fill="#444"/><text x="398" y="324.5" text-anchor="middle" font-size="11" fill="#fff">4</text>

  <line x1="530" y1="376" x2="171" y2="376" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="530" cy="376" r="12" fill="#444"/><text x="530" y="380.5" text-anchor="middle" font-size="11" fill="#fff">5</text>
  <text x="350" y="367" text-anchor="middle" font-size="11.5" fill="#222">地址(.m3u8 或 .mp4)</text>

  <line x1="40" y1="398" x2="1010" y2="398" stroke="#c9d2dc" stroke-width="1" stroke-dasharray="6 5"/>

  <!-- ── 阶段 B ─────────────────────────────────────────────── -->
  <rect x="40" y="410" width="176" height="22" rx="5" fill="#EEF2F7"/>
  <text x="52" y="426" font-size="11" font-weight="700" fill="#41556b">阶段 B · 按后缀分流并播放</text>

  <rect x="60" y="444" width="212" height="30" rx="8" fill="#FFF7E6" stroke="#F5A623" stroke-width="1.2"/>
  <text x="166" y="464" text-anchor="middle" font-size="11" fill="#B9720A">.mp4 → &lt;video src=mtmedia(…)&gt; 直喂</text>

  <rect x="60" y="482" width="212" height="30" rx="8" fill="#E8F1FC" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="166" y="502" text-anchor="middle" font-size="11" fill="#1B4F8C">.m3u8 → hls.js 接管(下方)</text>

  <line x1="165" y1="544" x2="524" y2="544" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="165" cy="544" r="12" fill="#444"/><text x="165" y="548.5" text-anchor="middle" font-size="11" fill="#fff">6</text>
  <text x="348" y="535" text-anchor="middle" font-size="11.5" fill="#222">GET 播放列表(同源 mtmedia)</text>

  <line x1="530" y1="586" x2="884" y2="586" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="530" cy="586" r="12" fill="#444"/><text x="530" y="590.5" text-anchor="middle" font-size="11" fill="#fff">7</text>
  <text x="710" y="577" text-anchor="middle" font-size="11.5" fill="#222">net.fetch m3u8(只带 UA,走系统代理)</text>

  <line x1="530" y1="636" x2="171" y2="636" stroke="#2E9E63" stroke-width="2" marker-end="url(#gG)"/>
  <circle cx="530" cy="636" r="12" fill="#2E9E63"/><text x="530" y="640.5" text-anchor="middle" font-size="11" fill="#fff">8</text>
  <text x="350" y="619" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1F8A54">重写后的列表 —— 每条 URI → mtmedia://</text>
  <text x="350" y="655" text-anchor="middle" font-size="10.5" fill="#3a7a5c">分片 / 变体列表 / #EXT-X-KEY 密钥 / #EXT-X-MAP</text>

  <line x1="165" y1="686" x2="524" y2="686" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <circle cx="165" cy="686" r="12" fill="#444"/><text x="165" y="690.5" text-anchor="middle" font-size="11" fill="#fff">9</text>
  <text x="348" y="677" text-anchor="middle" font-size="11.5" fill="#222">逐条取分片(仍是同源)</text>
  <line x1="530" y1="686" x2="884" y2="686" stroke="#444" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="710" y="677" text-anchor="middle" font-size="11.5" fill="#222">net.fetch 各分片</text>

  <rect x="176" y="722" width="250" height="28" rx="8" fill="#2E9E63"/>
  <text x="301" y="741" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">MSE 逐段喂 &lt;video&gt; → 播放</text>

  <!-- 注释 -->
  <rect x="40" y="764" width="970" height="62" rx="10" fill="#F7F9FB" stroke="#c9d2dc" stroke-width="1"/>
  <text x="60" y="786" font-size="11.5" fill="#41556b">· <tspan font-weight="700">兜底</tspan>:解析不到 player_aaaa(站点改版)才退回下载器那条隐藏窗口截流的老路 —— 它只认 *.m3u8,碰到 mp4 线路会白等到超时。</text>
  <text x="60" y="810" font-size="11.5" fill="#41556b">· <tspan font-weight="700">为什么要重写列表</tspan>:hls.js 在渲染进程里逐条取资源,拿原始 CDN 地址会被跨源策略拦。<tspan font-weight="700">失败</tspan>:hls.js 的 fatal → 线路兜底(换线路的同一集)。</text>
</svg>
