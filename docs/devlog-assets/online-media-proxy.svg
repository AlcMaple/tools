<svg viewBox="0 0 1020 680" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arwR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D64545"/>
    </marker>
    <marker id="arwG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E9E63"/>
    </marker>
  </defs>

  <rect width="1020" height="680" fill="#ffffff"/>
  <text x="510" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111">在线播放媒体流 —— 为什么 dev 直连播不了 · mtmedia 同源代理根治</text>
  <text x="510" y="52" text-anchor="middle" font-size="12" fill="#777">同一条稀饭主线直链,浏览器/打包版能播,dev 里 &lt;video&gt; 报 code 4 —— 差在页面 origin</text>

  <!-- ===================== 左:直连(挂) ===================== -->
  <rect x="40" y="70" width="450" height="576" rx="14" fill="#FDECEC" stroke="#E05B5B" stroke-width="1.5"/>
  <text x="265" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#B23838">❌ &lt;video&gt; 直连远端 mp4</text>
  <text x="265" y="118" text-anchor="middle" font-size="12" fill="#B76a6a">dev 页面 origin = http://localhost:5173</text>

  <rect x="80" y="140" width="370" height="66" rx="10" fill="#ffffff" stroke="#E05B5B" stroke-width="1.3"/>
  <text x="265" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#333">渲染进程 &lt;video&gt;</text>
  <text x="265" y="190" text-anchor="middle" font-size="11.5" fill="#666">src = https://…pan.wo.cn/…/结束NN.mp4</text>

  <line x1="265" y1="206" x2="265" y2="256" stroke="#D64545" stroke-width="1.8" marker-end="url(#arwR)"/>
  <text x="265" y="228" text-anchor="middle" font-size="11.5" fill="#B23838">① 跨源 + 响应带</text>
  <text x="265" y="245" text-anchor="middle" font-size="11.5" font-weight="600" fill="#B23838">content-disposition: attachment</text>

  <rect x="80" y="260" width="370" height="70" rx="10" fill="#ffffff" stroke="#E05B5B" stroke-width="1.3"/>
  <text x="265" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Chromium 媒体元素跨源策略</text>
  <text x="265" y="312" text-anchor="middle" font-size="11.5" fill="#666">带 attachment 的跨源媒体 → 拒绝解码</text>

  <line x1="265" y1="330" x2="265" y2="378" stroke="#D64545" stroke-width="1.8" marker-end="url(#arwR)"/>
  <text x="265" y="360" text-anchor="middle" font-size="11.5" font-weight="600" fill="#B23838">② MEDIA_ERR — code 4</text>

  <rect x="110" y="382" width="310" height="52" rx="10" fill="#D64545"/>
  <text x="265" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">视频加载失败(播放地址可能已过期)</text>

  <rect x="80" y="470" width="370" height="140" rx="10" fill="#FBE0E0" stroke="#E05B5B" stroke-width="1"/>
  <text x="100" y="495" font-size="12" font-weight="700" fill="#B23838">曾误判,均实测排除:</text>
  <text x="100" y="517" font-size="11" fill="#8a4a4a">· HEVC? canPlayType=probably,裸 &lt;video&gt; 能播</text>
  <text x="100" y="537" font-size="11" fill="#8a4a4a">· 缓存? 清空 185MB Cache/ 仍失败</text>
  <text x="100" y="557" font-size="11" fill="#8a4a4a">· 没登录? 匿名直链可取,与登录无关</text>
  <text x="100" y="584" font-size="12" font-weight="700" fill="#B23838">真因 = origin:</text>
  <text x="100" y="604" font-size="11" fill="#8a4a4a">打包后 file:// 不拦 → 只在 dev(localhost)复现</text>

  <!-- ===================== 右:mtmedia 代理(通) ===================== -->
  <rect x="530" y="70" width="450" height="576" rx="14" fill="#EAF7F0" stroke="#3BB273" stroke-width="1.5"/>
  <text x="755" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#1F8A54">✅ 经 mtmedia:// 同源代理</text>
  <text x="755" y="118" text-anchor="middle" font-size="12" fill="#4a9a72">src/main/shared/media-proxy.ts · dev/正式都不受 origin 限制</text>

  <rect x="570" y="140" width="370" height="62" rx="10" fill="#ffffff" stroke="#3BB273" stroke-width="1.3"/>
  <text x="755" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#333">渲染进程 &lt;video&gt;(同源!)</text>
  <text x="755" y="187" text-anchor="middle" font-size="11.5" fill="#666">src = mtmedia://media/?u=&lt;远端直链&gt;</text>

  <line x1="755" y1="202" x2="755" y2="242" stroke="#2E9E63" stroke-width="1.8" marker-end="url(#arwG)"/>
  <text x="755" y="226" text-anchor="middle" font-size="11.5" fill="#1F8A54">③ 同源请求 · Range 头原样透传</text>

  <rect x="570" y="246" width="370" height="70" rx="10" fill="#ffffff" stroke="#3BB273" stroke-width="1.3"/>
  <text x="755" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#333">主进程 protocol.handle</text>
  <text x="755" y="296" text-anchor="middle" font-size="11.5" fill="#666">net.fetch 远端(走系统代理,只带 UA)</text>

  <line x1="755" y1="316" x2="755" y2="356" stroke="#2E9E63" stroke-width="1.8" marker-end="url(#arwG)"/>
  <text x="755" y="334" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1F8A54">④ 剥掉 content-disposition</text>
  <text x="755" y="350" text-anchor="middle" font-size="11.5" fill="#1F8A54">流式透传(不 Buffer 全量缓冲)</text>

  <rect x="570" y="360" width="370" height="58" rx="10" fill="#ffffff" stroke="#3BB273" stroke-width="1.3"/>
  <text x="755" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#333">同源 200/206 + 视频流</text>
  <text x="755" y="405" text-anchor="middle" font-size="11.5" fill="#666">元凶头没了 → 跨源策略不再拦</text>

  <line x1="755" y1="418" x2="755" y2="456" stroke="#2E9E63" stroke-width="1.8" marker-end="url(#arwG)"/>

  <rect x="600" y="460" width="310" height="50" rx="10" fill="#2E9E63"/>
  <text x="755" y="491" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">正常播放(实测 8.3 MB/s)</text>

  <rect x="570" y="536" width="370" height="90" rx="10" fill="#DCF2E7" stroke="#3BB273" stroke-width="1"/>
  <text x="590" y="560" font-size="12" font-weight="700" fill="#1F8A54">两条附带保命线:</text>
  <text x="590" y="582" font-size="11.5" fill="#3a7a5c">· 每个 Range 重取新鲜签名链 → 避开 pan.wo.cn 单链并发限制</text>
  <text x="590" y="604" font-size="11.5" fill="#3a7a5c">· cancel()→AbortController.abort() 上游 → 切集/切线不卡</text>
</svg>
