<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAPLE TOOLS</title>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* 只给 html/body 铺暗色主题底色，消掉默认白屏。不做启动屏 ——
         窗口由主进程等渲染完全就绪后才一次性显示（见 main/index.ts），
         所以这层底色只在极早期兜底，用户基本看不到中间态。 */
      html { background: #f8f9fa; }        /* 浅色主题底色 */
      html.dark { background: #131313; }   /* 暗色主题底色（默认） */
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
