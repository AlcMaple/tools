<!doctype html>

<html class="dark" lang="en">

    <style>

        background: rgba(19, 19, 19, 0.8);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .active-glow {
        box-shadow: 0 0 15px rgba(240, 145, 153, 0.3);
      }
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #131313;
      }
      ::-webkit-scrollbar-thumb {
        background: #353535;
        border-radius: 2px;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .episode-grid-scroll {
        scrollbar-width: thin;
        scrollbar-color: #353535 #131313;

      <div

        <div class="flex items-center gap-4">
          <button

          <div class="h-6 w-[1px] bg-surface-variant/30"></div>
          <span

        </div>
        <div class="flex-1 max-w-xl mx-8">
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-60"

            <input

              placeholder="Search archive..."
              type="text"
            />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button
            class="p-2 text-[#e2e2e2] opacity-60 hover:opacity-100 hover:bg-surface-container rounded-full transition-all"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="dark_mode"
              >dark_mode</span
            >
          </button>
          <button
            class="p-2 text-[#e2e2e2] opacity-60 hover:opacity-100 hover:bg-surface-container rounded-full transition-all"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="settings"
              >settings</span
            >
          </button>
        </div>
      </div>

      <!-- Cinematic Player Section -->

        <div

          />

          >
            <div
              class="w-full h-1 bg-white/20 rounded-full mb-6 relative cursor-pointer group/progress"
            >
              <div
                class="absolute left-0 top-0 h-full w-[45%] bg-primary active-glow"
              ></div>
              <div
                class="absolute left-[45%] top-1/2 -translate-y-1/2 w-4 h-4 bg-primary rounded-full shadow-lg scale-0 group-hover/progress:scale-100 transition-transform"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-6">
                <button class="text-white hover:text-primary transition-colors">
                  <span
                    class="material-symbols-outlined !text-4xl"
                    style="font-variation-settings: &quot;FILL&quot; 1"
                    >play_arrow</span
                  >
                </button>
                <button class="text-white hover:text-primary transition-colors">
                  <span class="material-symbols-outlined">skip_next</span>
                </button>
                <div class="flex items-center gap-3">
                  <span
                    class="material-symbols-outlined text-white/80 text-[20px]"
                    >volume_up</span
                  >
                  <div class="w-20 h-1 bg-white/20 rounded-full">
                    <div class="w-2/3 h-full bg-white"></div>
                  </div>
                </div>
                <span
                  class="text-white/60 font-label text-[11px] tracking-widest"
                  >12:45 / 24:00</span
                >
              </div>
              <div class="flex items-center gap-6">
                <button
                  class="text-white/80 hover:text-primary transition-colors"
                >
                  <span class="material-symbols-outlined text-[20px]"
                    >subtitles</span
                  >
                </button>
                <button
                  class="text-white/80 hover:text-primary transition-colors"
                >
                  <span class="material-symbols-outlined text-[20px]"
                    >settings</span
                  >
                </button>
                <button
                  class="text-white/80 hover:text-primary transition-colors"
                >
                  <span class="material-symbols-outlined text-[20px]"
                    >fullscreen</span

              </div>
            </div>
          </div>
        </div>
        <!-- Title & Info -->

          <div class="space-y-2">
            <h1

              Neon Genesis: Rebuild 4.0
            </h1>
            <div class="flex gap-2 items-center">
              <span

              <span class="text-on-surface-variant/40">•</span>
              <span
                class="text-on-surface-variant/40 font-label text-[10px] uppercase tracking-wider"

            </div>
          </div>
          <div class="flex flex-col gap-2 min-w-[200px]">
            <span
              class="font-label text-[10px] uppercase tracking-[0.1em] text-on-surface-variant/40 font-bold"

            <div

              <button

                Source 3

            </div>
          </div>
        </div>

            <span class="text-on-surface-variant/30 text-[10px] font-label"

          </div>
          <div class="flex gap-2">
            <button
              class="p-1.5 rounded text-on-surface-variant/40 hover:text-on-surface transition-colors"

              <span class="material-symbols-outlined text-[18px]">search</span>

            <button
              class="p-1.5 rounded text-on-surface-variant/40 hover:text-on-surface transition-colors"
            >
              <span class="material-symbols-outlined text-[18px]">sort</span>

          </div>
        </div>

    ></div>
    <div
      class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-white/2 blur-[120px] -z-10 rounded-full"
    ></div>
